<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Form Kiểm thử SV31–SV40</title>

<style>

body{
font-family:Segoe UI, sans-serif;
background:#f2f3f5;
margin:0;
height:100vh;

display:flex;
justify-content:center;
align-items:center;
}

/* KHUNG FORM */

.card{
background:white;
width:360px;
padding:20px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,.1);

box-sizing:border-box;
}

/* TITLE */

h2{
text-align:center;
margin-bottom:16px;
font-size:22px;
}

/* LABEL */

label{
font-weight:600;
font-size:14px;
display:block;
margin-bottom:4px;
}

/* INPUT + SELECT */

input,
select{
width:100%;
padding:9px;

border-radius:6px;
border:1px solid #ccc;

margin-bottom:12px;

box-sizing:border-box;
font-size:14px;
}

/* RULE STATUS */

.status{
width:100%;

background:#e7e9fb;

padding:10px;

border-radius:6px;

margin-bottom:14px;

font-size:14px;

box-sizing:border-box;
}

/* BUTTON */

button{
width:100%;

padding:11px;

background:#28a745;

color:white;

border:none;

border-radius:6px;

font-size:15px;

cursor:pointer;

margin-top:4px;
}

button:hover{
background:#23913d;
}

/* ERROR BOX */

.error{
width:100%;

background:#f8d7da;

padding:12px;

border-radius:6px;

margin-top:14px;

color:#842029;

box-sizing:border-box;
}

/* SUCCESS BOX */

.success{
width:100%;

background:#d1e7dd;

padding:12px;

border-radius:6px;

margin-top:14px;

color:#0f5132;

box-sizing:border-box;
}

</style>
</head>

<body>

<div class="card">

<h2>Kiểm thử SV31-SV40</h2>

<label>Chọn Sinh viên</label>

<select id="svSelector">

<option value="31">SV31</option>
<option value="32">SV32</option>
<option value="33">SV33</option>
<option value="34">SV34</option>
<option value="35">SV35</option>
<option value="36">SV36</option>
<option value="37">SV37</option>
<option value="38">SV38</option>
<option value="39">SV39</option>
<option value="40">SV40</option>

</select>

<div id="ruleStatus" class="status">
Đang dùng quy tắc của SV31
</div>

<form id="registerForm">

<label>Họ tên</label>
<input id="name">

<label>Email</label>
<input id="email">

<label>SĐT</label>
<input id="phone">

<label>Mật khẩu</label>
<input id="password" type="password">

<button type="submit">Kiểm thử dữ liệu</button>

</form>

<div id="log"></div>

</div>

<script>

function hasSequentialNumbers(str){
return /(012|123|234|345|456|567|678|789)/.test(str);
}

function tripleRepeat(str){
return /(\d)\1\1/.test(str);
}

const rules={

31:{
name:v=>!/\s/.test(v)||"Tên không được chứa dấu cách",
email:v=>v.startsWith("user")||"Email phải bắt đầu bằng user",
phone:v=>!v.endsWith("0")||"SĐT không được kết thúc bằng 0",
pass:v=>!v.includes("@")||"Mật khẩu không được chứa ký tự @"
},

32:{
name:v=>v.split(" ").length>=2||"Tên phải có ≥2 từ",
email:v=>v.startsWith("user")||"Email phải bắt đầu bằng user",
phone:v=>v.startsWith("09")||"SĐT phải bắt đầu bằng 09",
pass:v=>!hasSequentialNumbers(v)||"Mật khẩu không được chứa số liên tiếp"
},

33:{
name:v=>/[A-Z]/.test(v)||"Tên phải có chữ in hoa",
email:v=>v.length>=15||"Email ≥15 ký tự",
phone:v=>v.startsWith("09")||"SĐT phải bắt đầu bằng 09",
pass:v=>!hasSequentialNumbers(v)||"Mật khẩu không được chứa số liên tiếp"
},

34:{
name:v=>!/\s/.test(v)||"Tên không được chứa dấu cách",
email:v=>/^[a-zA-Z0-9@.]+$/.test(v)||"Email không được chứa ký tự đặc biệt ngoài @ và .",
phone:v=>!tripleRepeat(v)||"SĐT không có 3 số lặp",
pass:v=>!v.includes("@")||"Mật khẩu không được chứa @"
},

35:{
name:v=>/^[a-zA-Z\s]+$/.test(v)||"Tên không được chứa ký tự đặc biệt",
email:v=>v.length>=15||"Email ≥15 ký tự",
phone:v=>v.length==11||"SĐT đúng 11 số",
pass:v=>v.length>=10||"Mật khẩu phải có ít nhất 10 ký tự"
},

36:{
name:v=>v.length<=20||"Tên không được vượt quá 20 ký tự",
email:v=>/^[a-zA-Z0-9@.]+$/.test(v)||"Email không được chứa ký tự đặc biệt ngoài @ và .",
phone:v=>!v.endsWith("0")||"SĐT không được kết thúc bằng 0",
pass:v=>(v.match(/[A-Z]/g)||[]).length>=2||"Mật khẩu phải có ít nhất 2 chữ hoa"
},

37:{
name:v=>/^[a-zA-Z\s]+$/.test(v)||"Tên không được chứa ký tự đặc biệt",
email:v=>(v.split("@")[0].match(/\./g)||[]).length==2||"Email cần đúng 2 dấu . trước @",
phone:v=>v.startsWith("09")||"SĐT phải bắt đầu bằng 09",
pass:v=>(v.match(/\d/g)||[]).length>=3||"Mật khẩu phải có ít nhất 3 số"
},

38:{
name:v=>!/\s/.test(v)||"Tên không được chứa dấu cách",
email:v=>/^[a-zA-Z0-9@.]+$/.test(v)||"Email không được chứa ký tự đặc biệt ngoài @ và .",
phone:v=>!tripleRepeat(v)||"SĐT không được có 3 số lặp",
pass:v=>(v.match(/[A-Z]/g)||[]).length>=2||"Mật khẩu phải có ít nhất 2 chữ hoa"
},

39:{
name:v=>v.length<=20||"Tên không được vượt quá 20 ký tự",
email:v=>!/\d/.test(v)||"Email không được chứa số",
phone:v=>!v.endsWith("0")||"SĐT không được kết thúc bằng 0",
pass:v=>!hasSequentialNumbers(v)||"Mật khẩu không được chứa số liên tiếp"
},

40:{
name:v=>v.length<=20||"Tên không được vượt quá 20 ký tự",
email:v=>/^[a-zA-Z0-9@.]+$/.test(v)||"Email không được chứa ký tự đặc biệt ngoài @ và .",
phone:v=>/^[02468]+$/.test(v)||"SĐT chỉ được chứa số chẵn",
pass:v=>!v.includes("@")||"Mật khẩu không được chứa @"
}

};

const selector=document.getElementById("svSelector");
const status=document.getElementById("ruleStatus");
const log=document.getElementById("log");

selector.addEventListener("change",()=>{
status.innerText="Đang dùng quy tắc của SV"+selector.value;
log.innerHTML="";
});

document.getElementById("registerForm").addEventListener("submit",function(e){

e.preventDefault();

let sv=selector.value;

let data={
name:document.getElementById("name").value.trim(),
email:document.getElementById("email").value.trim(),
phone:document.getElementById("phone").value.trim(),
pass:document.getElementById("password").value.trim()
};

let errors=[];

for(let key in rules[sv]){
let check=rules[sv][key](data[key]);
if(check!==true) errors.push(check);
}

if(errors.length>0){

log.className="error";
log.innerHTML="<b>Lỗi:</b><br>• "+errors.join("<br>• ");

}else{

log.className="success";
log.innerHTML="Đăng ký hợp lệ ✔";

}

});

</script>

</body>
</html>
