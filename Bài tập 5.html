<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giả Lập Đăng Ký Tài Khoản</title>
    <script>
        function validateForm() {
            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Kiểm tra họ tên
            if (/[^a-zA-Z\s]/.test(fullName) || fullName.length < 3) {
                alert('Họ tên không hợp lệ. Yêu cầu: không chứa số hoặc ký tự đặc biệt, tối thiểu 3 ký tự.');
                return;
            }

            // Kiểm tra email
            if (!email.includes('@') || !email.includes('.')) {
                alert('Email không hợp lệ. Yêu cầu: định dạng phải chứa "@" và "."');
                return;
            }

            // Kiểm tra số điện thoại
            if (!/^0[0-9]{9}$/.test(phone)) {
                alert('Số điện thoại không hợp lệ. Yêu cầu: gồm 10 chữ số và bắt đầu bằng "0".');
                return;
            }

            // Kiểm tra mật khẩu
            const hasUpperCase = /[A-Z]/.test(password);
            const hasLowerCase = /[a-z]/.test(password);
            const hasNumber = /[0-9]/.test(password);
            const hasSpecialChar = /[!@#$%^&*]/.test(password);

            if (password.length < 8 || !hasUpperCase || !hasLowerCase || !hasNumber || !hasSpecialChar) {
                alert('Mật khẩu không hợp lệ. Yêu cầu: tối thiểu 8 ký tự, gồm chữ in hoa, chữ thường, số, và ký tự đặc biệt (!@#$%^&*).');
                return;
            }

            // Kiểm tra xác nhận mật khẩu
            if (password !== confirmPassword) {
                alert('Xác nhận mật khẩu không khớp.');
                return;
            }

            alert('Đăng ký thành công!');
        }
    </script>
</head>
<body>
    <h1>Đăng Ký Tài Khoản</h1>
    <form onsubmit="event.preventDefault(); validateForm();">
        <label for="fullName">Họ Tên:</label><br>
        <input type="text" id="fullName" placeholder="Nhập họ tên"><br><br>

        <label for="email">Email:</label><br>
        <input type="text" id="email" placeholder="Nhập email"><br><br>

        <label for="phone">Số Điện Thoại:</label><br>
        <input type="text" id="phone" placeholder="Nhập số điện thoại"><br><br>

        <label for="password">Mật Khẩu:</label><br>
        <input type="password" id="password" placeholder="Nhập mật khẩu"><br><br>

        <label for="confirmPassword">Xác Nhận Mật Khẩu:</label><br>
        <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu"><br><br>

        <button type="submit">Đăng Ký</button>
    </form>
</body>
</html>
