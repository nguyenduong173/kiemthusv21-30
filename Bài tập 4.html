<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giả Lập Đăng Nhập - Phức Tạp</title>
    <script>
        function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Kiểm tra email
            if (!email.includes('@') || !email.includes('.com') || email.length < 10) {
                alert('Email không hợp lệ. Yêu cầu: chứa @, .com và tối thiểu 10 ký tự.');
                return;
            }

            // Kiểm tra mật khẩu
            const hasUpperCase = /[A-Z]/.test(password);
            const hasLowerCase = /[a-z]/.test(password);
            const hasNumber = /[0-9]/.test(password);
            const hasSpecialChar = /[!@#$%^&*]/.test(password);

            if (password.length < 8 || !hasUpperCase || !hasLowerCase || !hasNumber || !hasSpecialChar) {
                alert('Mật khẩu không hợp lệ. Yêu cầu: ít nhất 8 ký tự, gồm chữ in hoa, chữ thường, số và ký tự đặc biệt (!@#$%^&*).');
                return;
            }

            alert('Đăng nhập thành công.');
        }
    </script>
</head>
<body>
    <h1>Đăng Nhập</h1>
    <input type="text" id="email" placeholder="Nhập email"><br>
    <input type="password" id="password" placeholder="Nhập mật khẩu"><br>
    <button onclick="login()">Đăng Nhập</button>
</body>
</html>
