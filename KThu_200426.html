<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ thống Kiểm thử Đăng ký Multi-SV</title>
    <style>

body{
font-family: "Segoe UI", sans-serif;
background: linear-gradient(135deg,#4facfe,#00f2fe);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
}

.card{
background:white;
padding:35px;
border-radius:16px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
width:460px;
animation: fadeIn .6s ease;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

h2{
text-align:center;
color:#333;
margin-bottom:25px;
}

.form-group{
margin-bottom:18px;
}

label{
font-weight:600;
color:#444;
margin-bottom:6px;
display:block;
}

select,input{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
font-size:15px;
transition:.3s;
}

select:focus,input:focus{
border-color:#4facfe;
outline:none;
box-shadow:0 0 6px rgba(79,172,254,.4);
}

button{
width:100%;
padding:14px;
background:linear-gradient(135deg,#667eea,#764ba2);
color:white;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 6px 12px rgba(0,0,0,.2);
}

#log{
margin-top:20px;
padding:14px;
border-radius:10px;
font-size:14px;
line-height:1.6;
}

.error{
background:#ffe5e5;
border-left:6px solid #ff4d4f;
color:#a8071a;
}

.success{
background:#e6fffb;
border-left:6px solid #13c2c2;
color:#006d75;
font-weight:bold;
text-align:center;
}

.info-box{
font-size:13px;
color:#555;
background:#f0f5ff;
padding:12px;
border-left:5px solid #4facfe;
border-radius:8px;
margin-bottom:18px;
}

</style>
</head>
<body>

<div class="card">
    <h2>Form Đăng Ký</h2>
    
    <div class="form-group">
        <label>Chọn cấu hình kiểm thử (Sinh viên):</label>
        <select id="svSelector">
            <option value="21">SV 21</option>
            <option value="22">SV 22</option>
            <option value="23">SV 23</option>
            <option value="24">SV 24</option>
            <option value="25">SV 25</option>
            <option value="26">SV 26</option>
            <option value="27">SV 27</option>
            <option value="28">SV 28</option>
            <option value="29">SV 29</option>
            <option value="30">SV 30</option>
        </select>
    </div>

    <div class="info-box" id="ruleInfo">Đang tải quy tắc...</div>

    <form id="registerForm">
        <div class="form-group">
            <label>Họ Tên:</label>
            <input type="text" id="fullName" placeholder="Nhập họ tên...">
        </div>
        <div class="form-group">
            <label>Email:</label>
            <input type="text" id="email" placeholder="Nhập email...">
        </div>
        <div class="form-group">
            <label>Số Điện Thoại:</label>
            <input type="text" id="phone" placeholder="Nhập số điện thoại...">
        </div>
        <div class="form-group">
            <label>Mật Khẩu:</label>
            <input type="password" id="password" placeholder="Nhập mật khẩu...">
        </div>
        <button type="submit">Kiểm thử Đăng ký</button>
    </form>

    <div id="log"></div>
</div>

<script>
// Định nghĩa bộ quy tắc của 10 sinh viên
const svRules = {
    "21": {
        name: (v) => !/[!@#$%^&*(),.?":{}|<>]/.test(v) || "Họ tên không được chứa ký tự đặc biệt.",
        email: (v) => v.startsWith('user') || "Email phải bắt đầu bằng 'user'.",
        phone: (v) => v.length === 11 || "SĐT phải đúng 11 số.",
        pass: (v) => (v.match(/\d/g) || []).length >= 3 || "Mật khẩu phải có ít nhất 3 số."
    },
    "22": {
        name: (v) => !/\s/.test(v) || "Họ tên không được chứa dấu cách.",
        email: (v) => !/\d/.test(v) || "Email không được chứa số.",
        phone: (v) => /^[02468]+$/.test(v) || "SĐT chỉ được chứa số chẵn.",
        pass: (v) => v.length >= 10 || "Mật khẩu phải có ít nhất 10 ký tự."
    },
    "23": {
        name: (v) => v.trim().split(/\s+/).length >= 2 || "Họ tên phải có ít nhất 2 từ.",
        email: (v) => v.startsWith('user') || "Email phải bắt đầu bằng 'user'.",
        phone: (v) => /^[02468]+$/.test(v) || "SĐT chỉ được chứa số chẵn.",
        pass: (v) => (v.match(/\d/g) || []).length >= 3 || "Mật khẩu phải có ít nhất 3 số."
    },
    "24": {
        name: (v) => /[A-Z]/.test(v) || "Họ tên phải có ít nhất 1 chữ hoa.",
        email: (v) => v.startsWith('user') || "Email phải bắt đầu bằng 'user'.",
        phone: (v) => v.startsWith('09') || "SĐT phải bắt đầu bằng '09'.",
        pass: (v) => v.length >= 10 || "Mật khẩu phải có ít nhất 10 ký tự."
    },
    "25": {
        name: (v) => v.length <= 20 || "Họ tên không được quá 20 ký tự.",
        email: (v) => v.startsWith('user') || "Email phải bắt đầu bằng 'user'.",
        phone: (v) => !v.endsWith('0') || "SĐT không được kết thúc bằng số '0'.",
        pass: (v) => (v.match(/[A-Z]/g) || []).length >= 2 || "Mật khẩu phải có ít nhất 2 chữ hoa."
    },
    "26": {
        name: (v) => v.trim().split(/\s+/).length >= 2 || "Họ tên phải có ít nhất 2 từ.",
        email: (v) => !/\d/.test(v) || "Email không được chứa số.",
        phone: (v) => /^[02468]+$/.test(v) || "SĐT chỉ được chứa số chẵn.",
        pass: (v) => !v.includes('@') || "Mật khẩu không được chứa ký tự '@'."
    },
    "27": {
        name: (v) => /[A-Z]/.test(v) || "Họ tên phải có ít nhất 1 chữ hoa.",
        email: (v) => v.startsWith('user') || "Email phải bắt đầu bằng 'user'.",
        phone: (v) => v.length === 11 || "SĐT phải đúng 11 số.",
        pass: (v) => v.length >= 10 || "Mật khẩu phải có ít nhất 10 ký tự."
    },
    "28": {
        name: (v) => v.trim().split(/\s+/).length >= 2 || "Họ tên phải có ít nhất 2 từ.",
        email: (v) => (v.split('@')[0].match(/\./g) || []).length === 2 || "Email phải có đúng 2 dấu '.' trước '@'.",
        phone: (v) => !v.endsWith('0') || "SĐT không được kết thúc bằng số '0'.",
        pass: (v) => (v.match(/\d/g) || []).length >= 3 || "Mật khẩu phải có ít nhất 3 số."
    },
    "29": {
        name: (v) => !/\s/.test(v) || "Họ tên không được chứa dấu cách.",
        email: (v) => !/\d/.test(v) || "Email không được chứa số.",
        phone: (v) => !v.endsWith('0') || "SĐT không được kết thúc bằng số '0'.",
        pass: (v) => (v.match(/\d/g) || []).length >= 3 || "Mật khẩu phải có ít nhất 3 số."
    },
    "30": {
        name: (v) => v.length <= 20 || "Họ tên không được quá 20 ký tự.",
        email: (v) => !/\d/.test(v) || "Email không được chứa số.",
        phone: (v) => v.length === 11 || "SĐT phải đúng 11 số.",
        pass: (v) => v.length >= 10 || "Mật khẩu phải có ít nhất 10 ký tự."
    }
};

const selector = document.getElementById('svSelector');
const ruleInfo = document.getElementById('ruleInfo');
const log = document.getElementById('log');

// Cập nhật hiển thị quy tắc khi đổi SV
function updateInfo() {
    const sv = selector.value;
    ruleInfo.innerHTML = `<strong>Quy tắc đang áp dụng:</strong><br> SV ${sv} - Đang sẵn sàng kiểm thử.`;
    log.className = ""; log.innerText = "";
}

selector.addEventListener('change', updateInfo);
updateInfo();

document.getElementById('registerForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const sv = selector.value;
    const rules = svRules[sv];
    
    const data = {
        name: document.getElementById('fullName').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        pass: document.getElementById('password').value
    };

    let errors = [];
    
    // Chạy kiểm tra theo bộ quy tắc đã chọn
    for (let key in rules) {
        let result = rules[key](data[key]);
        if (result !== true) errors.push(result);
    }

    if (errors.length > 0) {
        log.className = "error";
        log.innerHTML = "<strong>Lỗi kiểm thử:</strong><br>• " + errors.join("<br>• ");
    } else {
        log.className = "success";
        log.innerText = `Chúc mừng! SV ${sv} đã vượt qua bài kiểm thử thành công.`;
    }
});
</script>
</body>
</html>
